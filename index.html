<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Para Daniela 💖</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #ffd1dc, #ff4d6d);
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* TEXTO PRINCIPAL */
        .title {
            position: absolute;
            top: 5%;
            font-family: 'Great Vibes', cursive;
            font-size: 4em;
            color: white;
            text-shadow: 0 0 25px white;
            opacity: 0;
            animation: fadeIn 3s forwards;
        }

        /* RAMO */
        .bouquet {
            position: relative;
            width: 300px;
            height: 400px;
        }

        /* TALLOS */
        .stem {
            position: absolute;
            bottom: 0;
            width: 5px;
            height: 0;
            background: linear-gradient(to top, #14532d, #22c55e);
            left: 50%;
            border-radius: 5px;
            animation: growStem 2s forwards;
        }

        .stem:nth-child(1) {
            transform: translateX(-50px) rotate(-15deg);
            animation-delay: 0.5s;
        }

        .stem:nth-child(2) {
            transform: translateX(-10px) rotate(-5deg);
            animation-delay: 0.8s;
        }

        .stem:nth-child(3) {
            transform: translateX(20px) rotate(10deg);
            animation-delay: 1.1s;
        }

        /* ROSA */
        .rose {
            position: absolute;
            width: 70px;
            height: 70px;
            transform: scale(0);
            transition: transform 0.8s ease-out;
        }

        .rose.show {
            transform: scale(1);
        }

        /* pétalos animados */
        .petal {
            position: absolute;
            width: 40px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #ffccd5, #ff4d6d);
            border-radius: 50%;
            transform-origin: bottom center;
            opacity: 0;
        }

        /* animación pétalos */
        .rose.show .petal {
            animation: openPetal 1.2s ease-out forwards;
        }

        .petal:nth-child(1) {
            --r: 0deg;
            animation-delay: 0.2s;
        }

        .petal:nth-child(2) {
            --r: 60deg;
            animation-delay: 0.4s;
        }

        .petal:nth-child(3) {
            --r: 120deg;
            animation-delay: 0.6s;
        }

        .petal:nth-child(4) {
            --r: 180deg;
            animation-delay: 0.8s;
        }

        .petal:nth-child(5) {
            --r: 240deg;
            animation-delay: 1s;
        }

        .petal:nth-child(6) {
            --r: 300deg;
            animation-delay: 1.2s;
        }

        /* centro */
        .center {
            position: absolute;
            width: 25px;
            height: 25px;
            background: white;
            border-radius: 50%;
            top: 20px;
            left: 22px;
            opacity: 0;
        }

        .rose.show .center {
            animation: fadeIn 1s forwards 1.3s;
        }

        /* posiciones */
        .r1 {
            bottom: 200px;
            left: 80px;
        }

        .r2 {
            bottom: 250px;
            left: 130px;
        }

        .r3 {
            bottom: 220px;
            left: 180px;
        }

        /* CARTA */
        .card {
            position: absolute;
            bottom: -200px;
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: 0.8s;
        }

        .card.show {
            bottom: 50px;
        }

        .card h2 {
            font-family: 'Great Vibes', cursive;
            color: #ff4d6d;
        }

        .card p {
            font-size: 14px;
        }

        /* BOTÓN */
        .btn {
            position: absolute;
            bottom: 20px;
            background: #ff4d6d;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
        }

        /* PARTÍCULAS */
        .heart {
            position: absolute;
            color: white;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        /* ANIMACIONES */
        @keyframes growStem {
            to {
                height: 220px;
            }
        }

        @keyframes openPetal {
            0% {
                opacity: 0;
                transform: rotate(var(--r)) translateY(0px) scale(0);
            }

            100% {
                opacity: 1;
                transform: rotate(var(--r)) translateY(-20px) scale(1);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
            }

            to {
                transform: translateY(-10vh);
            }
        }
    </style>
</head>

<body>

    <div class="title">Daniela ❤️</div>

    <div class="bouquet">
        <div class="stem"></div>
        <div class="stem"></div>
        <div class="stem"></div>

        <!-- rosas -->
        <div class="rose r1">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="center"></div>
        </div>

        <div class="rose r2">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="center"></div>
        </div>

        <div class="rose r3">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="center"></div>
        </div>
    </div>

    <!-- carta -->
    <div class="card" id="card">
        <h2>Para ti 💌</h2>
        <p>Daniela, este pequeño detalle es solo para recordarte lo increíble que eres </p>
    </div>

    <button class="btn" onclick="start()">Haz clic 💖</button>

    <!-- música -->
    <audio id="music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
    </audio>

    <script>
        function start() {
            document.querySelectorAll('.rose').forEach((r, i) => {
                setTimeout(() => r.classList.add('show'), i * 800);
            });

            document.getElementById('card').classList.add('show');
            document.getElementById('music').play();

            // corazones
            setInterval(() => {
                let h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = '❤️';
                h.style.left = Math.random() * 100 + 'vw';
                document.body.appendChild(h);

                setTimeout(() => h.remove(), 6000);
            }, 500);
        }
    </script>

</body>

</html>
